<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0b0b0f" />
  <title>Apuestas Deportivas | Ghost Plague Casino</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;800;900&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />

  <!-- App CSS (Base Tokens) -->
  <link rel="stylesheet" href="../Assets/css/app.css" />
  <!-- Sports CSS -->
  <link rel="stylesheet" href="../Assets/css/servicios.css" />
</head>
<body class="sports-body">

  <div id="screen-sports" class="screen screen--sports is-active">
    
    <!-- Ambient background layers -->
    <div class="app__bg" aria-hidden="true">
      <div class="app__bg-grid"></div>
      <div class="app__bg-glow app__bg-glow--top"></div>
      <div class="app__bg-glow app__bg-glow--btm"></div>
    </div>

    <!-- ─── TOP BAR (SPORTS) ─────────────────────────── -->
    <header class="topbar-sports" role="banner">
      <button class="topbar-sports__back" id="btn-back-sports" aria-label="Volver al inicio">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
          <path d="M15 18L9 12L15 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span class="topbar-sports__back-text">Volver</span>
      </button>

      <h2 class="topbar-sports__title">Apuestas Deportivas</h2>

      <div class="topbar-sports__balance">
        <span class="balance-icon">🪙</span>
        <span id="sports-user-bits">...</span>
      </div>
    </header>

    <!-- ─── MAIN CONTENT ───────────────────────────────── -->
    <main class="sports-main" role="main">
      
      <!-- Ligas / Categorías Header -->
      <section class="sports-header">
        <h3 class="sports-header__title">
          <span class="sports-header__icon">🔥</span> Eventos Destacados
        </h3>
        <p class="sports-header__subtitle">Las mejores cuotas del mercado, garantizado.</p>
      </section>

      <!-- Grid de Partidos -->
      <div class="matches-grid" id="matchesContainer">
        <!-- Loader inicial -->
        <div style="grid-column: 1/-1; text-align:center; padding: 40px; color: var(--text-muted);">
          Buscando eventos en vivo... 
          <span class="loader__skull" style="display:inline-block; font-size:24px; animation: skullFloat 2s ease-in-out infinite;">💀</span>
        </div>
      </div>

    </main>

    <!-- Bottom safe area -->
    <div class="safe-bottom" aria-hidden="true"></div>

  </div><!-- end #screen-sports -->

  <!-- Telegram WebApp SDK -->
  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <!-- Firebase compat SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
  
  <!-- App JS -->
  <script src="../Assets/js/firebase.js"></script>
  <script src="../Assets/js/servicios.js"></script>
</body>
</html>
